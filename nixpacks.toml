[phases.setup]
nixPkgs = ["python312"]

[phases.install]
dependsOn = ["setup"]
cmds = [
  "python -m venv --copies /opt/venv",
  "/opt/venv/bin/pip install uv==0.4.30",
  "VIRTUAL_ENV=/opt/venv /opt/venv/bin/uv sync --no-dev --python /opt/venv/bin/python"
]
cacheDirectories = ["/root/.cache/uv"]

[phases.build]
dependsOn = ["install"]
cmds = [
  "printf '\\nPATH=/opt/venv/bin:$PATH' >> /root/.profile"
]

[start]
cmd = "/opt/venv/bin/uvicorn api.main:app --host 0.0.0.0 --port $PORT"
