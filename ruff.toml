line-length = 100
target-version = "py312"
extend-exclude = ["**/migrations/**", ".venv", "node_modules", "build", "dist", ".tmp"]

[lint]
select = [
    "E",     # pycodestyle errors
    "F",     # pyflakes
    "I",     # isort
    "UP",    # pyupgrade
    "B",     # bugbear
    "SIM",   # simplify
    "RUF",   # ruff-specific
    "ASYNC", # async best practices
    "S",     # bandit (security)
    "T20",   # no print statements
]
ignore = [
    "E501",  # line too long (handled by formatter)
    "S101",  # asserts ok in tests
    "S105",  # hardcoded password false positives in tests
    "S106",
]

[lint.per-file-ignores]
"**/tests/**/*.py" = ["S", "T20", "B017"]
"**/scripts/**/*.py" = ["T20", "S603", "S607", "S310", "S311", "S108", "S110", "S112"]
"**/notebooks/**/*.py" = ["T20", "E402"]
"runpod/quant-foundry-training/run_import_bisection.py" = ["T20", "S310", "S110", "E741"]
"runpod/quant-foundry-training/run_live_canary.py" = ["T20", "S310", "S110"]
"runpod/quant-foundry-training/run_gpu_healthcheck.py" = ["T20", "S310", "S110"]
"runpod/quant-foundry-training/run_train_model.py" = ["T20", "S310", "S110", "S311"]
"runpod/quant-foundry-training/run_callback_ingestion_proof.py" = ["S311"]
"runpod/quant-foundry-training/handler.py" = ["T20", "S310", "S607"]
"runpod/quant-foundry-training/handler_diagnostic.py" = ["T20"]
"runpod/quant-foundry-training/handler_minimal.py" = ["T20"]
"services/agents/src/agents/gbm_predictor/train.py" = ["T20"]
"services/agents/src/agents/news_alpha_predictor/train.py" = ["T20"]
"services/agents/src/agents/news_alpha_predictor/evaluate.py" = ["T20"]
# quant_foundry source: pickle for model serialization, random for non-crypto purposes
"services/quant_foundry/src/quant_foundry/**/*.py" = ["S301", "S311"]
# API service: subprocess for training dispatch
"services/api/**/training.py" = ["S603"]

[lint.isort]
known-first-party = [
    "fincept_core", "fincept_bus", "fincept_db", "fincept_tools", "fincept_sdk",
    "ingestor", "features", "agents", "orchestrator", "risk", "oms",
    "portfolio", "api", "backtester", "jobs",
]

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
