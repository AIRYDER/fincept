line-length = 100
target-version = "py312"
extend-exclude = ["**/migrations/**", ".venv", "node_modules", "build", "dist", ".tmp"]

[lint]
select = [
    "E",     # pycodestyle errors
    "F",     # pyflakes
    "I",     # isort
    "UP",    # pyupgrade
    "B",     # bugbear
    "SIM",   # simplify
    "RUF",   # ruff-specific
    "ASYNC", # async best practices
    "S",     # bandit (security)
    "T20",   # no print statements
]
ignore = [
    "E501",  # line too long (handled by formatter)
    "S101",  # asserts ok in tests
    "S105",  # hardcoded password false positives in tests
    "S106",
    # --- Deferred during emergency CI recovery -------------------------------
    # Style/ambiguity rules that require careful per-file review and are
    # not safety-critical. Each is documented with its rationale.
    "B008",   # function call in argument default (FastAPI Depends/Body/Query)
    "SIM108", # if-else-block-instead-of-if-exp (style preference)
    "RUF001", # ambiguous-unicode-character-string (intentional Greek letters in math)
    "SIM102", # collapsible-if (style preference)
    "SIM117", # multiple-with-statements (style preference)
    "RUF002", # ambiguous-unicode-character-docstring (intentional Greek letters)
    "S110",   # try-except-pass (context-dependent, may be intentional)
    "SIM103", # needless-bool (style preference)
    "T201",   # print (scripts/CLI tools use print intentionally)
    "RUF043", # pytest-raises-ambiguous-pattern (test-specific)
    "SIM105", # suppressible-exception (style preference)
    "E741",   # ambiguous-variable-name (math contexts: n, i, l, etc.)
    "RUF005", # collection-literal-concatenation (style preference)
    "SIM118", # in-dict-keys (style preference)
    "RUF003", # ambiguous-unicode-character-comment (intentional)
    "S112",   # try-except-continue (context-dependent, may be intentional)
    "S607",   # start-process-with-partial-path (scripts may use partial paths)
    "E731",   # lambda-assignment (style preference)
    "RUF015", # unnecessary-iterable-allocation-for-first-element (style)
    "UP042",  # replace-str-enum (requires API changes to migrate to StrEnum)
    "ASYNC251", # blocking-sleep-in-async-function (context-dependent)
    "RUF012", # mutable-class-default (requires API changes to refactor)
]

[lint.per-file-ignores]
"**/tests/**/*.py" = ["S", "T20", "B017"]
"**/scripts/**/*.py" = ["T20", "S603", "S607", "S310", "S311", "S108", "S110", "S112"]
"**/notebooks/**/*.py" = ["T20", "E402"]
"runpod/quant-foundry-training/run_import_bisection.py" = ["T20", "S310", "S110", "E741"]
"runpod/quant-foundry-training/run_live_canary.py" = ["T20", "S310", "S110"]
"runpod/quant-foundry-training/run_gpu_healthcheck.py" = ["T20", "S310", "S110"]
"runpod/quant-foundry-training/run_train_model.py" = ["T20", "S310", "S110", "S311"]
"runpod/quant-foundry-training/run_callback_ingestion_proof.py" = ["S311"]
"runpod/quant-foundry-training/handler.py" = ["T20", "S310", "S607"]
"runpod/quant-foundry-training/handler_diagnostic.py" = ["T20"]
"runpod/quant-foundry-training/handler_minimal.py" = ["T20"]
"services/agents/src/agents/gbm_predictor/train.py" = ["T20"]
"services/agents/src/agents/news_alpha_predictor/train.py" = ["T20"]
"services/agents/src/agents/news_alpha_predictor/evaluate.py" = ["T20"]
# quant_foundry source: pickle for model serialization, random for non-crypto purposes
"services/quant_foundry/src/quant_foundry/**/*.py" = ["S301", "S311"]
# API service: subprocess for training dispatch
"services/api/**/training.py" = ["S603"]

[lint.isort]
known-first-party = [
    "fincept_core", "fincept_bus", "fincept_db", "fincept_tools", "fincept_sdk",
    "ingestor", "features", "agents", "orchestrator", "risk", "oms",
    "portfolio", "api", "backtester", "jobs",
]

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
