name: nightly

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

# Least-privilege: nightly only reads the repo and audits deps. No write
# access to contents. (security-events: write would be needed to upload SARIF
# to GitHub Security tab; add explicitly if/when that's enabled.)
permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"

jobs:
  long-tests:
    name: Long tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 10
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_DB: fincept
          POSTGRES_USER: fincept
          POSTGRES_PASSWORD: fincept
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U fincept"
          --health-interval 5s --health-timeout 5s --health-retries 12
    env:
      FINCEPT_DB_URL: postgresql+asyncpg://fincept:fincept@localhost:5432/fincept
      FINCEPT_REDIS_URL: redis://localhost:6379/0
      FINCEPT_TRADING_MODE: paper
      FINCEPT_LOG_LEVEL: WARNING
    steps:
      # pin: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # pin: astral-sh/setup-uv@v3
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39
        with:
          enable-cache: true
          version: "latest"
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync --all-packages --all-groups
      - run: uv run alembic -c libs/fincept-db/alembic.ini upgrade head
      - name: Pytest long markers
        run: |
          set +e
          uv run pytest -q -m "long" --tb=short
          ec=$?
          if [ $ec -eq 5 ]; then
            echo "::notice::No tests marked @long yet"
            exit 0
          fi
          exit $ec

  vuln-scan:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    steps:
      # pin: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # pin: aquasecurity/trivy-action@master (pinned to 0.71.2 release SHA)
      - uses: aquasecurity/trivy-action@cf5c088a69634cd13ccddc735d7926162c31f9a6
        with:
          scan-type: fs
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

  pip-audit:
    name: Python dependency audit
    runs-on: ubuntu-latest
    steps:
      # pin: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # pin: astral-sh/setup-uv@v3
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39
        with:
          enable-cache: true
          version: "latest"
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync --all-packages --all-groups
      - name: pip-audit (installed env)
        run: |
          uv run pip install pip-audit
          uv run pip-audit --ignore-vuln GHSA-4xh5-x5gv-qwph
