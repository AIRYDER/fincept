name: build-images

on:
  push:
    branches: [main]
    paths:
      - "services/**"
      - "infra/docker/**"
      - "runpod/**"
      - ".github/workflows/build-images.yml"
  workflow_dispatch: {}

# Least-privilege: only packages: write (needed to push images to ghcr.io).
# contents stays read-only — this workflow never writes to the repo.
permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: [ingestor, agents, api, orchestrator, risk, oms]
    steps:
      # pin: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Check Dockerfile exists
        id: check
        run: |
          if [ -f "infra/docker/${{ matrix.image }}.Dockerfile" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No Dockerfile for ${{ matrix.image }} yet; deferred until its implementing task lands"
          fi

      # pin: docker/setup-buildx-action@v3
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f
        if: steps.check.outputs.exists == 'true'

      # pin: docker/login-action@v3
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        if: steps.check.outputs.exists == 'true'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # pin: docker/build-push-action@v6
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        if: steps.check.outputs.exists == 'true'
        with:
          context: .
          file: infra/docker/${{ matrix.image }}.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.image }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}/${{ matrix.image }}:latest
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  build-runpod:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: [quant-foundry-training, quant-foundry-inference]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Check Dockerfile exists
        id: check
        run: |
          if [ -f "runpod/${{ matrix.image }}/Dockerfile" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No Dockerfile for runpod/${{ matrix.image }}"
          fi

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f
        if: steps.check.outputs.exists == 'true'

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        if: steps.check.outputs.exists == 'true'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        if: steps.check.outputs.exists == 'true'
        with:
          context: .
          file: runpod/${{ matrix.image }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.image }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}/${{ matrix.image }}:latest
          build-args: |
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha,scope=runpod-${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=runpod-${{ matrix.image }}
