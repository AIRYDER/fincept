name: build-images

on:
  push:
    branches: [main]
    paths:
      - "services/**"
      - "infra/docker/**"
      - ".github/workflows/build-images.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: [ingestor, agents, api, orchestrator, risk, oms]
    steps:
      - uses: actions/checkout@v4

      - name: Check Dockerfile exists
        id: check
        run: |
          if [ -f "infra/docker/${{ matrix.image }}.Dockerfile" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No Dockerfile for ${{ matrix.image }} yet; deferred until its implementing task lands"
          fi

      - uses: docker/setup-buildx-action@v3
        if: steps.check.outputs.exists == 'true'

      - uses: docker/login-action@v3
        if: steps.check.outputs.exists == 'true'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        if: steps.check.outputs.exists == 'true'
        with:
          context: .
          file: infra/docker/${{ matrix.image }}.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.image }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}/${{ matrix.image }}:latest
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
