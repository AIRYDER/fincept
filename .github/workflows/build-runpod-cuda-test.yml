name: build-runpod-cuda-test

on:
  push:
    paths:
      - "runpod/quant-foundry-cuda-test/**"
      - ".github/workflows/build-runpod-cuda-test.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image repository
        id: image_repo
        run: echo "value=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: runpod/quant-foundry-cuda-test/Dockerfile
          push: true
          build-args: |
            GIT_SHA=${{ github.sha }}
          tags: |
            ${{ steps.image_repo.outputs.value }}/quant-foundry-cuda-test:${{ github.sha }}
            ${{ steps.image_repo.outputs.value }}/quant-foundry-cuda-test:latest
          cache-from: type=gha,scope=quant-foundry-cuda-test
          cache-to: type=gha,mode=max,scope=quant-foundry-cuda-test
