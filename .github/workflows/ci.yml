name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege: read-only by default. No job in this workflow needs write
# access to the repo contents. (build-images.yml grants packages: write where
# needed; release workflows would grant contents: write explicitly.)
permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"
  PNPM_VERSION: "9"

jobs:
  py-lint-typecheck:
    name: Python lint + typecheck
    runs-on: ubuntu-latest
    steps:
      # pin: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install uv
        # pin: astral-sh/setup-uv@v3
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39
        with:
          enable-cache: true
          version: "latest"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Sync workspace
        run: uv sync --all-packages --all-groups

      - name: Ruff lint
        run: uv run ruff check libs services

      - name: Ruff format check
        run: uv run ruff format --check libs services

      - name: Mypy
        run: uv run mypy libs services

  py-test:
    name: Python tests + coverage
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 10
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_DB: fincept
          POSTGRES_USER: fincept
          POSTGRES_PASSWORD: fincept
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U fincept"
          --health-interval 5s --health-timeout 5s --health-retries 12
    env:
      FINCEPT_DB_URL: postgresql+asyncpg://fincept:fincept@localhost:5432/fincept
      FINCEPT_REDIS_URL: redis://localhost:6379/0
      FINCEPT_TRADING_MODE: paper
      FINCEPT_LOG_LEVEL: WARNING
    steps:
      # pin: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install uv
        # pin: astral-sh/setup-uv@v3
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39
        with:
          enable-cache: true
          version: "latest"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Sync workspace
        run: uv sync --all-packages --all-groups

      - name: Alembic upgrade (validates migration)
        run: uv run alembic -c libs/fincept-db/alembic.ini upgrade head

      - name: Pytest + coverage
        run: |
          set +e
          uv run pytest --cov --cov-report=xml --cov-report=term-missing
          ec=$?
          if [ $ec -eq 5 ]; then
            echo "::notice::No tests collected (scaffold phase); coverage gate skipped"
            exit 0
          fi
          exit $ec

      - name: Upload coverage
        if: always()
        # pin: actions/upload-artifact@v4
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  js-lint-typecheck-test:
    name: JS lint + typecheck + test
    runs-on: ubuntu-latest
    steps:
      # pin: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # pin: pnpm/action-setup@v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with:
          version: ${{ env.PNPM_VERSION }}
      # pin: actions/setup-node@v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm -r --if-present lint
      - run: pnpm -r --if-present typecheck
      - run: pnpm -r --if-present test
      - run: pnpm -r --if-present build

  security:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      # pin: actions/checkout@v4 — full history for gitleaks scan
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with: { fetch-depth: 0 }
      # pin: gitleaks/gitleaks-action@v2
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # --------------------------------------------------------------------------- #
  # TASK-0104: receipt runner — fails if any REQUIRED check in the receipt      #
  # harness fails. Guards against a PR silently dropping a runtime safety check. #
  # --------------------------------------------------------------------------- #
  receipt-runner:
    name: Verification receipt
    runs-on: ubuntu-latest
    steps:
      # pin: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install uv
        # pin: astral-sh/setup-uv@v3
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39
        with:
          enable-cache: true
          version: "latest"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Sync workspace
        run: uv sync --all-packages --all-groups

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dashboard dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Run verification receipt (pwsh)
        shell: pwsh
        run: ./scripts/verification-receipt.ps1

      - name: Upload receipt
        if: always()
        # pin: actions/upload-artifact@v4
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: verification-receipt
          path: reports/verification/
          if-no-files-found: warn

  # --------------------------------------------------------------------------- #
  # TASK-0104: startup safety matrix — the guard that prevents silent startup   #
  # regressions. Runs the matrix tests as a required CI check.                  #
  # --------------------------------------------------------------------------- #
  startup-safety-matrix:
    name: Startup safety matrix
    runs-on: ubuntu-latest
    steps:
      # pin: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install uv
        # pin: astral-sh/setup-uv@v3
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39
        with:
          enable-cache: true
          version: "latest"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Sync workspace
        run: uv sync --all-packages --all-groups

      - name: Startup safety matrix tests
        run: uv run pytest libs/fincept-core/tests/test_startup_safety_matrix.py -q

  # --------------------------------------------------------------------------- #
  # TASK-0104: lockfile discipline — fail if lockfiles are out of sync with     #
  # manifest files. Prevents "works on my machine" drift from landing on main.  #
  # --------------------------------------------------------------------------- #
  lockfile-sync:
    name: Lockfile sync check
    runs-on: ubuntu-latest
    steps:
      # pin: actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: uv.lock in sync
        # pin: astral-sh/setup-uv@v3
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39
        with:
          enable-cache: true
          version: "latest"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Check uv.lock is up to date
        run: |
          uv lock --check
          echo "::notice::uv.lock is in sync with pyproject.toml manifests"

      # pin: pnpm/action-setup@v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with:
          version: ${{ env.PNPM_VERSION }}

      # pin: actions/setup-node@v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Check pnpm-lock.yaml is up to date
        run: |
          pnpm install --frozen-lockfile
          echo "::notice::pnpm-lock.yaml is in sync with package.json manifests"
